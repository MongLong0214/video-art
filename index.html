<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>video-art</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
      #info {
        position: fixed;
        bottom: 12px;
        left: 12px;
        color: rgba(255, 255, 255, 0.4);
        font: 12px/1.4 monospace;
        pointer-events: none;
        z-index: 10;
      }
      #info.recording {
        color: #f44;
      }
    </style>
  </head>
  <body>
    <div id="info"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
